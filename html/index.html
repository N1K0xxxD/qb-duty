<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QBCore Admin Menu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="admin-menu" class="admin-menu hidden">
        <div class="admin-header">
            <h2><i class="fas fa-shield-alt"></i> Admin Panel</h2>
            <button id="close-btn" class="close-btn"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="admin-content">
            <div class="admin-sidebar">
                <div class="admin-info">
                    <h3>Admin Level: <span id="admin-level">0</span></h3>
                    <p>Online Players: <span id="player-count">0</span></p>
                </div>
                
                <div class="admin-actions">
                    <h4>Quick Actions</h4>
                    <button class="action-btn" onclick="healAll()">
                        <i class="fas fa-heart"></i> Heal All
                    </button>
                    <button class="action-btn" onclick="reviveAll()">
                        <i class="fas fa-cross"></i> Revive All
                    </button>
                    <button class="action-btn" onclick="clearArea()">
                        <i class="fas fa-broom"></i> Clear Area
                    </button>
                </div>
            </div>
            
            <div class="players-section">
                <div class="section-header">
                    <h3><i class="fas fa-users"></i> Online Players</h3>
                    <div class="search-box">
                        <input type="text" id="player-search" placeholder="Search players...">
                        <i class="fas fa-search"></i>
                    </div>
                </div>
                
                <div class="players-list" id="players-list">
                    <!-- Players will be populated here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Player Action Modal -->
    <div id="player-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-player-name">Player Name</h3>
                <button class="close-btn" onclick="closePlayerModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="modal-body">
                <div class="player-info">
                    <p><strong>ID:</strong> <span id="modal-player-id">0</span></p>
                    <p><strong>Job:</strong> <span id="modal-player-job">Unemployed</span></p>
                    <p><strong>Admin Level:</strong> <span id="modal-player-admin">0</span></p>
                </div>
                
                <div class="action-buttons">
                    <button class="action-btn" onclick="teleportToPlayer()">
                        <i class="fas fa-location-arrow"></i> Teleport To
                    </button>
                    <button class="action-btn" onclick="bringPlayer()">
                        <i class="fas fa-magic"></i> Bring Player
                    </button>
                    <button class="action-btn" onclick="spectatePlayer()">
                        <i class="fas fa-eye"></i> Spectate
                    </button>
                    <button class="action-btn" onclick="healPlayer()">
                        <i class="fas fa-heart"></i> Heal
                    </button>
                    <button class="action-btn" onclick="revivePlayer()">
                        <i class="fas fa-cross"></i> Revive
                    </button>
                    <button class="action-btn" onclick="freezePlayer()">
                        <i class="fas fa-snowflake"></i> Freeze
                    </button>
                    <button class="action-btn warning" onclick="showKickModal()">
                        <i class="fas fa-boot"></i> Kick
                    </button>
                    <button class="action-btn danger" onclick="showBanModal()">
                        <i class="fas fa-ban"></i> Ban
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Kick Modal -->
    <div id="kick-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Kick Player</h3>
                <button class="close-btn" onclick="closeKickModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="modal-body">
                <div class="form-group">
                    <label for="kick-reason">Reason:</label>
                    <input type="text" id="kick-reason" placeholder="Enter kick reason...">
                </div>
                
                <div class="modal-actions">
                    <button class="action-btn" onclick="kickPlayer()">Kick Player</button>
                    <button class="action-btn secondary" onclick="closeKickModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Ban Modal -->
    <div id="ban-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Ban Player</h3>
                <button class="close-btn" onclick="closeBanModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="modal-body">
                <div class="form-group">
                    <label for="ban-reason">Reason:</label>
                    <input type="text" id="ban-reason" placeholder="Enter ban reason...">
                </div>
                
                <div class="form-group">
                    <label for="ban-duration">Duration (hours, 0 = permanent):</label>
                    <input type="number" id="ban-duration" placeholder="0" min="0">
                </div>
                
                <div class="modal-actions">
                    <button class="action-btn danger" onclick="banPlayer()">Ban Player</button>
                    <button class="action-btn secondary" onclick="closeBanModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
